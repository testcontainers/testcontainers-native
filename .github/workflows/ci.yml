name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-project-devcontainers:
    name: Build (Dev Containers)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
        
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2 
        with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in the dev container image
        uses: devcontainers/ci@v0.3
        with:
            imageName: ghcr.io/testcontainers/testcontainers-native-builder
            cacheFrom: ghcr.io/testcontainers/testcontainers-native-builder
            push: never
            runCmd: |
              cmake .
              cmake --build .
              ctest --output-on-failure
            env: |
              GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  build-site:
    name: Build Site
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
        
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2 
        with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in the dev container image
        uses: devcontainers/ci@v0.3
        with:
            imageName: ghcr.io/testcontainers/testcontainers-native-builder
            cacheFrom: ghcr.io/testcontainers/testcontainers-native-builder
            push: never
            runCmd: |
              mkdocs build
            env: |
              FULL_BUILD=true
              GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
